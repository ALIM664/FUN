.loaderText{

@keyframes pulseRotate{

        opacity:0.1;
        transform: scale(1) rotate(0deg);
    }

    25%{
        opacity:1;
        transform: scale(1.5) rotate(20deg);
    }

    50%{
        opacity:0.1;
        transform: scale(1) rotate(0deg);
    }

    75%{
        opacity:1;
        transform: scale(1.5) rotate(-20deg);

    100%{

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io(window.location.origin);

let currentUser = {
    id: null,
    nickname: null,
    loggedIn: false
};

socket.on("connect", () => {
    console.log("CONNECTED:", socket.id);
});

let otherPlayers = {};

socket.on("players", (data) => {
    if (!data || typeof data !== "object") return;
    otherPlayers = data;
});
socket.on("damage", (data) => {

    player.knockX = data.knockX * 3;
    player.knockY = data.knockY * 2;

});

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const keys = {};

document.addEventListener("keydown", e => {
    if(e.repeat) return;

    keys[e.code] = true;

    if(e.code === "KeyF"){
        toggleFullscreen();
    }
});

document.addEventListener("keyup", e => {
    keys[e.code] = false;
});

let playerColor = "red";
let playerNickname = "Player";
let gameStarted = false;

let inClan = false;
let clanOwner = false;

window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", resizeCanvas);
resizeCanvas();

let currentMap = 0;

const maps = [
    {
        bg: "#87CEEB",
        platformColor: "green"
    },
    {
        bg: "#ff9900",
        platformColor: "#000000"
    },
    {
        bg: "#110011",
        platformColor: "#ffddff"
    },
    {
        bg: "#333333",
        platformColor: "#dddddd"
    }
];

const mapEnemies = [
    [],
    [],
    [],
    []
];

const isMobile =
    /Android|iPhone|iPad|iPod|Opera Mini|IEMobile/i
    .test(navigator.userAgent);

if(isMobile){

    document.getElementById("mobileControls").style.display = "flex";

    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");
    const jumpBtn = document.getElementById("jumpBtn");
    const attackBtn = document.getElementById("attackBtn");

    leftBtn.addEventListener("touchstart", e=>{
        e.preventDefault();
        keys["ArrowLeft"] = true;
    });

    leftBtn.addEventListener("touchend", ()=>{
        keys["ArrowLeft"] = false;
    });

    rightBtn.addEventListener("touchstart", e=>{
        e.preventDefault();
        keys["ArrowRight"] = true;
    });

    rightBtn.addEventListener("touchend", ()=>{
        keys["ArrowRight"] = false;
    });

    jumpBtn.addEventListener("touchstart", e=>{
        e.preventDefault();
        keys["Space"] = true;
    });

    jumpBtn.addEventListener("touchend", ()=>{
        keys["Space"] = false;
    });

    attackBtn.addEventListener("touchstart", e=>{
        e.preventDefault();
        attack();
    });
}

function toggleFullscreen(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

function resizeCanvas(){
    const dpr = window.devicePixelRatio || 1;

    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ================= CAMERA =================
let camX = 0;

// ================= PLAYER =================
const player = {
    x: 3000,
    y: 100,
    w: 40,
    h: 40,

    vx: 0,
    vy: 0,

    speed: 6,
    jump: 14,

    grounded: false,
    dir: 1,

    knockX: 0,
    knockY: 0,

    attacking: false,
    attackTime: 0,
    lastAttack: 0,
    attackCooldown: 0
};

let coins = 0;

let playerPower = 100;
let attackCooldown = 800;
let attackRange = 50;
let enemyPowerNerf = 1;

let invincible = false;
let invincibleTimer = 0;
let freezeHit = false;
let shield = false;
let shieldTimer = 0;

let level = 1;

let enemySpawnCounter = 0;

let speedPrice = 100;
let powerPrice = 200;
let attackSpeedPrice = 250;
let attackRangePrice = 250;
let nerfPrice = 300;

// ================= ENEMIES =================
const enemies = [
    makeEnemy(1900, 3.2, 80),
    makeEnemy(1700, 2.0, 110),
    makeEnemy(1500, 1.6, 140),

    makeJumpEnemy(4200, 1.7, 90),
    makeJumpEnemy(4400, 1.0, 120),

    makeFastEnemy(2500, 5.4, 30),
    makeFastEnemy(3000, 5.2, 40),
    makeFastEnemy(3900, 5.0, 50),
];

function makeEnemy(x, speed, power){
    return {
        startX: x,
        startY: 100,

        x, y: 100,
        w: 40,
        h: 40,

        vx: 0,
        vy: 0,

        speed,
        power,

        dir: -1,

        knockX: 0,
        knockY: 0,

        attacking: false,
        attackTime: 0,
        lastAttack: 0,

        stayNearTimer: 0,
        stayNearLimit: 3 + Math.random() * 2,

        invulnerable: false,
        invulnerableTimer: 0,
    };
}

function makeJumpEnemy(x, speed, power){
    return {
        type: "jumper",

        startX: x,
        startY: 100,

        x, y: 100,
        w: 40,
        h: 40,

        vx: 0,
        vy: 0,

        speed,
        power,

        dir: -1,

        knockX: 0,
        knockY: 0,

        attacking: false,
        attackTime: 0,
        lastAttack: 0,

        grounded: false,
        jumpTimer: 0,

        stayNearTimer: 0,
        stayNearLimit: 3 + Math.random() * 2,

        invulnerable: false,
        invulnerableTimer: 0,
    };
}

function makeFastEnemy(x, speed, power){
    return {
        type: "fast",

        startX: x,
        startY: 100,

        x,
        y: 100,

        w: 30,
        h: 30,

        vx: 0,
        vy: 0,

        speed,
        power,

        dir: -1,

        knockX: 0,
        knockY: 0,

        attacking: false,
        attackTime: 0,
        lastAttack: 0,

        grounded: false,

        stayNearTimer: 0,
        stayNearLimit: 3 + Math.random() * 2,

        invulnerable: false,
        invulnerableTimer: 0,
    };
}

const gravity = 0.7;

// ================= PLATFORMS (×3) =================
const mapPlatforms = [

    // Карта 1
    [
        {x:1500, y:600, w:3000, h:50},
        {x:2500, y:500, w:1000, h:20},
        {x:3500, y:400, w:1000, h:20},

    ],

    // Карта 2
    [
        {x:1500, y:600, w:3000, h:50},
        {x:2500, y:500, w:600, h:20},
        {x:3500, y:500, w:600, h:20},
        {x:1500, y:500, w:600, h:20},

        {x:2000, y:400, w:600, h:20},

        {x:2500, y:400, w:500, h:20},

        {x:2000, y:500, w:500, h:20},
        {x:3000, y:500, w:500, h:20},
        {x:4000, y:500, w:500, h:20},
        {x:2000, y:300, w:500, h:20},
        {x:3000, y:300, w:500, h:20},
        {x:4000, y:300, w:500, h:20}
    ]
];

// ================= INPUT =================
function attack(){
    const now = Date.now();

    if(now - player.lastAttack > attackCooldown){
        player.attacking = true;
        player.attackTime = 5;
        player.lastAttack = now;
    }
}

function enemyAttack(e){
    const now = Date.now();

    const cooldown =
        e.type === "fast"
        ? 300
        : 700;

    if(now - e.lastAttack > cooldown){
        e.attacking = true;
        e.attackTime = 10;
        e.lastAttack = now;
    }
}

// ================= COLLISION =================
function move(obj, delta){

    let nextX = obj.x + (obj.vx + obj.knockX) * delta;
    let nextY = obj.y + (obj.vy + obj.knockY) * delta;

    obj.grounded = false;

    for(const p of mapPlatforms[currentMap]){

        const centerX = nextX + obj.w / 2;

        if(
            centerX > p.x &&
            centerX < p.x + p.w &&
            obj.y + obj.h <= p.y &&
            nextY + obj.h >= p.y
        ){
            nextY = p.y - obj.h;
            obj.vy = 0;
            obj.grounded = true;
        }
    }

    obj.x = nextX;
    obj.y = nextY;

    obj.knockX *= 0.85;
    obj.knockY *= 0.85;
}

// ================= HIT =================
function hit(a,b){
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
}

function restoreLogin() {

    const token = localStorage.getItem("token");
    const account = localStorage.getItem("account");

    if (!token || !account) return;

    try {

        const data = JSON.parse(account);

        currentUser.nickname = data.nickname;
        currentUser.id = data.id;
        currentUser.loggedIn = true;

        playerNickname = data.nickname;

        document.getElementById("nicknameInput").value = data.nickname;

        document.getElementById("accountInfoBtn").style.display = "block";
        document.getElementById("deleteAccountBtn").style.display = "block";

    } catch (e) {
        localStorage.removeItem("account");
        localStorage.removeItem("token");
    }
}

async function updateClanUI(){

    if(!token) return;


    const res = await fetch("/clan/me",{
        headers:{
            Authorization:token
        }
    });


    const data = await res.json();


    const btn = document.querySelector("#clanSidebar button");


    if(!data.inClan){

        inClan = false;
        clanOwner = false;

        document.getElementById("clanRequests").innerHTML = "";

        btn.textContent = "➕ Создать клан";
        btn.onclick = openCreateClan;

    }else{

        inClan = true;


        if(data.owner){

            clanOwner = true;

            btn.textContent = "🗑 Удалить клан";
            btn.onclick = deleteClan;


            // вот здесь появляются заявки
            loadClanRequests();


        }else{

            clanOwner = false;

            document.getElementById("clanRequests").innerHTML = "";

            btn.textContent = "🚪 Покинуть клан";
            btn.onclick = leaveClan;

        }

    }


    loadClans();

}

function addLevel(){
    level++;
    document.getElementById("level").textContent = level;

    if(level % 5 === 0){
        spawnRandomEnemy();
    }

    saveGame();

    const audio = new Audio("https://raw.githubusercontent.com/ALIM664/FUN/main/funsounds/1029200_Bitsplosion.mp3");

    audio.play().catch(err => console.log(err));

    const startTime = 119.1;
    const endTime = 119.8;

    audio.addEventListener("loadedmetadata", () => {
      audio.currentTime = startTime;
      audio.play();
    });

    audio.addEventListener("timeupdate", () => {
      if (audio.currentTime >= endTime) {
        audio.pause();
        audio.currentTime = startTime;
      }
    });
}

function spawnRandomEnemy(){
    const x = (Math.random() * 2900) + 1500;

    const type = Math.floor(Math.random() * 3);

    let e;

    if(type === 0){
        e = makeEnemy(x, 2 + Math.random(), 100);
    }
    else if(type === 1){
        e = makeJumpEnemy(x, 1.5 + Math.random(), 90);
    }
    else{
        e = makeFastEnemy(x);
    }

    enemies.push(e);
}

function buySpeed(){
    if(coins >= speedPrice){
        coins -= speedPrice;
        player.speed += 1;

        speedPrice = Math.floor(speedPrice + 10);

        document.getElementById("coins").textContent = coins;
        updateShopPrices();
        addLevel();

        saveGame();
    }
}

function buyPower(){
    if(coins >= powerPrice){
        coins -= powerPrice;
        playerPower += 10;

        powerPrice = Math.floor(powerPrice + 10);

        document.getElementById("coins").textContent = coins;
        updateShopPrices();
        addLevel();

        saveGame();
    }
}

function buyAttackSpeed(){
    if(coins >= attackSpeedPrice){
        coins -= attackSpeedPrice;

        attackCooldown = Math.max(100, attackCooldown - 10);

        attackSpeedPrice = Math.floor(attackSpeedPrice + 10);

        document.getElementById("coins").textContent = coins;
        updateShopPrices();
        addLevel();

        saveGame();
    }
}

function buyAttackRange(){
    if(coins >= attackRangePrice){
        coins -= attackRangePrice;

        attackRange += 5;

        attackRangePrice = Math.floor(attackRangePrice + 10);

        document.getElementById("coins").textContent = coins;
        updateShopPrices();
        addLevel();

        saveGame();
    }
}

function nerfEnemies(){
    if(coins >= nerfPrice){
        coins -= nerfPrice;

        enemyPowerNerf = Math.max(0.3, enemyPowerNerf - 0.2);

        nerfPrice = Math.floor(nerfPrice + 10);

        document.getElementById("coins").textContent = coins;
        updateShopPrices();
        addLevel();

        saveGame();
    }
}

function switchMap(i){
    const dx = player.x;
    const dy = player.y;

    currentMap = i;

    // телепорт игрока
    player.x = 3000;
    player.y = 100;

    // телепорт всех врагов вместе с ним (с сохранением относительной позиции)
    for(const e of enemies){
        e.x = 3000 + (e.x - dx);
        e.y = 100 + (e.y - dy);

        e.startX = e.x;
        e.startY = e.y;
    }
}

// ================= UPDATE =================
function update(delta){
    if(!gameStarted) return;

    // ===== PLAYER =====
    player.vx = 0;

    if(keys["KeyA"] || keys["ArrowLeft"]){
        player.vx = -player.speed;
        player.dir = -1;
    }

    if(keys["KeyD"] || keys["ArrowRight"]){
        player.vx = player.speed;
        player.dir = 1;
    }

    if((keys["KeyW"] || keys["ArrowUp"] || keys["Space"]) && player.grounded){
        player.vy = -player.jump;
    }

    if(keys["KeyH"] && !player.attacking){
        attack();
    }

    player.vy += gravity * delta;

    move(player, delta);

    if(player.attackTime > 0) player.attackTime -= delta;
    else player.attacking = false;

    if (currentMap === 3 && player.attacking) {

        const hitbox = {
            x: player.dir === 1
                ? player.x + player.w
                : player.x - attackRange,
            y: player.y,
            w: attackRange,
            h: player.h
        };

        for (const id in otherPlayers) {

            if (id === socket.id) continue;

            const p = otherPlayers[id];

            if (p.map !== 3) continue;

            const target = {
                x: p.x,
                y: p.y,
                w: 40,
                h: 40
            };

            if (hit(hitbox, target)) {

                socket.emit("pvpHit", id);

                player.attackTime = 0;

                break;
            }
        }
    }

    // ===== ENEMIES =====
    if(currentMap < 3){
        const mainPlatform = mapPlatforms[currentMap][0];

        for(const e of enemies){

            if(e.invulnerable){
                e.invulnerableTimer -= delta;

                if(e.invulnerableTimer <= 0){
                    e.invulnerable = false;
                }
            }

            // AI движение
            const onMainPlatform =
                player.x >= 1500 &&
                player.x <= 4460 &&
                player.y + player.h <= 650;

            if(onMainPlatform){
                if(player.x < e.x){
                    e.vx = -e.speed;
                    e.dir = -1;
                } else {
                    e.vx = e.speed;
                    e.dir = 1;
                }
            } else {
                e.vx = 0; // ждать на платформе
            }

            // гравитация
            e.vy += gravity * delta;

            move(e, delta);

            // ===== падение за карту =====
            if (e.y > window.innerHeight + 300) {

                if(e.type === "jumper"){
                    coins += 1;
                }
                else if(e.type === "fast"){
                    coins += 5;
                }
                else{
                    coins += 2;
                }

                document.getElementById("coins").textContent = coins;
                saveGame();

                e.x = e.startX;
                e.y = e.startY;

                e.vx = 0;
                e.vy = 0;

                e.knockX = 0;
                e.knockY = 0;

                e.invulnerable = true;
                e.invulnerableTimer = 180;
            }

            // ===== атака =====
            if(e.attackTime > 0){
                e.attackTime -= delta;
            } else {
                e.attacking = false;
            }

            if(hit(e, player)){
                enemyAttack(e);

                if(e.attacking){
                    player.knockX = e.dir * e.power * enemyPowerNerf;
                    player.knockY = -e.power * 0.4 * enemyPowerNerf;
                }
            }

            // ===== прыгуны =====
            if(e.type === "jumper"){
                if(e.jumpTimer <= 0){
                    e.vy = -15 - Math.random() * 5;
                    e.jumpTimer = 70 + Math.random() * 10;
                } else {
                    e.jumpTimer -= delta;
                }
            }

            // ===== удар игрока =====
            if(player.attackTime > 0){

                const range = attackRange;

                const hitbox = {
                    x: player.dir === 1 ? player.x + player.w : player.x - range,
                    y: player.y,
                    w: range,
                    h: player.h
                };

                if(hit(hitbox, e) && !e.invulnerable){

                    e.knockX = player.dir * e.power * 1.1;
                    e.knockY = -e.power * 0.5;

                    player.attackTime = 0;
                }
            }
            if (Math.abs(e.x - player.x) <= 2) {
            
                e.stayNearTimer += delta / 60;
            
                if (e.stayNearTimer >= e.stayNearLimit) {
                
                    e.vy = -18;
                
                    e.stayNearTimer = 0;
                    e.stayNearLimit = 3 + Math.random() * 2;
                }
            
            } else {
                e.stayNearTimer = 0;
            }
        }
    }

    // ===== CAMERA =====
    camX += (player.x - window.innerWidth / 2 - camX) * 0.1;

    // reset player fall
    if(player.y > window.innerHeight + 300){
        player.x = 3000;
        player.y = 100;
    }

    if (gameStarted) {
        socket.emit("move", {
            x: player.x,
            y: player.y,
            nickname: playerNickname,
            color: playerColor,
            map: currentMap
        });
    }

    document.getElementById("stats").textContent =
        `speed:${player.speed}___power:${playerPower}___CD:${attackCooldown}ms___EN:${enemies.length}`;
}

// ================= DRAW =================
function draw(){
    if(!gameStarted) return;

    ctx.fillStyle = maps[currentMap].bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();

    const zoom = isMobile ? 0.6 : 1;
    const cameraYOffset = isMobile ? -150 : 0;

    ctx.translate(window.innerWidth / 2, window.innerHeight / 2);
    ctx.scale(zoom, zoom);
    ctx.translate(
        -camX - window.innerWidth / 2,
        -window.innerHeight / 2 + cameraYOffset
    );

    // ===== платформы =====
    ctx.fillStyle = maps[currentMap].platformColor;

    for(const p of mapPlatforms[currentMap]){
        ctx.fillRect(p.x, p.y, p.w, p.h);
    }

    // ===== игрок =====
    ctx.fillStyle = playerColor;
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.strokeStyle = "yellow"; 
    ctx.lineWidth = 3; 
    ctx.strokeRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = "white";
    ctx.font = "bold 18px Arial";
    ctx.textAlign = "center";

    ctx.fillText(
        playerNickname,
        player.x + player.w / 2,
        player.y - 10
    );

    // ===== враги =====

    if(currentMap !== 3){
        for(const e of enemies){
            if(e.invulnerable){
                ctx.globalAlpha = 0.4;
            }

            if(e.type === "jumper"){
                ctx.fillStyle = "yellow";
            }
            else if(e.type === "fast"){
                ctx.fillStyle = "purple";
            }
            else{
                ctx.fillStyle = "blue";
            }

            ctx.fillRect(e.x, e.y, e.w, e.h);
            ctx.globalAlpha = 1;

            // эффект атаки врага
            if(e.attacking){

                ctx.strokeStyle = "black";
                ctx.lineWidth = 6;

                const y = e.y + e.h / 2;
                const x1 = e.dir === 1 ? e.x + e.w : e.x;
                const x2 = e.dir === 1 ? x1 + 60 : x1 - 60;

                ctx.beginPath();
                ctx.moveTo(x1, y);
                ctx.lineTo(x2, y);
                ctx.stroke();
            }
        }
    }

    // ===== эффект атаки игрока =====
    if(player.attacking){

        ctx.strokeStyle = "brown";
        ctx.lineWidth = 6;

        const y = player.y + player.h / 2;
        const x1 = player.dir === 1 ? player.x + player.w : player.x;
        const x2 = player.dir === 1 
            ? x1 + attackRange 
            : x1 - attackRange;

        ctx.beginPath();
        ctx.moveTo(x1, y);
        ctx.lineTo(x2, y);
        ctx.stroke();
    }

    for (const id in (otherPlayers || {})) {
        if (id === socket.id) continue;

        const p = otherPlayers[id];
        if (p.map !== currentMap) continue;

        ctx.fillStyle = "white";
        ctx.font = "bold 18px Arial";
        ctx.textAlign = "center";
        ctx.fillText(p.nickname, p.x + 20, p.y - 10);

        ctx.globalAlpha = currentMap === 3 ? 1 : 0.4;

        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 40, 40);
        ctx.strokeStyle = "rgba(120, 120, 120, 0.9)"; 
        ctx.lineWidth = 3; 
        ctx.strokeRect(p.x, p.y, 40, 40);
    }

    ctx.restore();
}

window.addEventListener("load", async () => {
    restoreLogin();
    await loadGame();
});

// ================= LOOP =================
let lastTime = performance.now();

function loop(time){

    let delta = (time - lastTime) / 16.67;
    lastTime = time;

    delta = Math.min(delta, 2);

    update(delta);
    draw();

    requestAnimationFrame(loop);
}

window.addEventListener("load", loadGame);

window.addEventListener("load", () => {

    const loader = document.getElementById("loadingScreen");

    requestAnimationFrame(() => {
        loader.style.opacity = "0";
        loader.style.transition = "0.5s";

        setTimeout(() => {
            loader.style.display = "none";
        }, 500);
    });

    const acc =
        JSON.parse(localStorage.getItem("account"));

    if(acc){

        document.getElementById("nicknameInput").value =
            acc.nickname;

        document.getElementById("passwordInput").value =
            acc.password;

        playerNickname = acc.nickname;
    }

    loadGame();
    restoreLogin();
});
</script>
